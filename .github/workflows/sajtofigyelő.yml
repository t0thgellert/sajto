name: Sajtófigyelő – heti frissülés ellenőrzése

on:
  schedule:
    # Minden hétfőn 10:00 UTC = 12:00 magyar idő
    # (a feldolgozó workflow / CoWork futása UTÁN)
    - cron: "0 10 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:

      - name: Repo checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # teljes git history kell a log-hoz

      - name: Frissült-e az index.html ezen a héten?
        run: |
          LAST_COMMIT=$(git log -1 --format="%ci" -- docs/index.html)
          LAST_DATE=$(echo "$LAST_COMMIT" | cut -c1-10)
          echo "Utolsó index.html módosítás: $LAST_DATE"

          # A FOLYÓ hét hétfője (nem az előzőé!):
          # %u = a hét napja 1–7 (hétfő=1) → ennyi-1 napot vonunk ki a mai dátumból
          MON_THIS_WEEK=$(date -d "-$(( $(date +%u) - 1 )) days" +%Y-%m-%d)
          echo "E hét hétfője: $MON_THIS_WEEK"

          if [[ "$LAST_DATE" < "$MON_THIS_WEEK" ]]; then
            echo "::warning::A sajtófigyelő NEM frissült ezen a héten! Utolsó frissítés: $LAST_DATE"
            echo "::warning::Ellenőrizd a feldolgozó workflow-t / CoWork futását."
            exit 1
          fi
          echo "✅ Az index.html friss ($LAST_DATE) – nincs teendő."
