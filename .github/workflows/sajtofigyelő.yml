name: Sajtófigyelő – heti frissülés ellenőrzése

on:
  schedule:
    # Hétfő 15:30 UTC = 17:30 magyar idő (a Cowork 16:00-s futása után)
    - cron: "30 15 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:

      - name: Repo checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Frissült-e az index.html az elmúlt 8 napban?
        run: |
          LAST_COMMIT=$(git log -1 --format="%ct" -- docs/index.html)
          NOW=$(date +%s)
          AGE_DAYS=$(( (NOW - LAST_COMMIT) / 86400 ))
          echo "Utolsó index.html módosítás: $(git log -1 --format='%ci' -- docs/index.html)  (${AGE_DAYS} napja)"

          if [ "$AGE_DAYS" -gt 8 ]; then
            echo "::warning::A sajtófigyelő ${AGE_DAYS} napja NEM frissült!"
            echo "::warning::Ellenőrizd a Cowork scheduled task futását (hétfő/péntek 16:00)."
            exit 1
          fi
          echo "✅ Az index.html friss (${AGE_DAYS} napja módosult) – nincs teendő."
